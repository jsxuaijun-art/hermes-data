model:
  base_url: "https://llm.chudian.site/v1"
  default: "deepseek-v4-flash"
  provider: "custom"

# 第三方中转 API 注册（必须用 YAML 列表格式）
custom_providers:
  - name: "chudian"
    display_name: "初点中转"
    base_url: "https://llm.chudian.site/v1"
    api_key: "sk-ag-4fe1e7d229cd3bd5ced354c8e5397e3a"
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro
      - deepseek-v3.2

terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  lifetime_seconds: 300

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: "medium"

display:
  tool_progress: all
  streaming: true
  show_reasoning: false
  skin: default

platforms:
  wecom:
    enabled: true

# Desktop app API server (auto-configured)
platforms:
  api_server:
    enabled: true
    extra:
      port: 8642
      host: "127.0.0.1"

platform_toolsets:
  cli:
      - image_gen
      - memory

